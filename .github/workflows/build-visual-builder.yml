name: Build Visual Builder

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    name: Export ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows
            export-name: Windows
            output-path: build/windows/visual-builder.exe
            artifact-name: visual-builder-windows
            artifact-path: build/windows/
          - platform: macOS
            export-name: macOS
            output-path: build/macos/visual-builder.zip
            artifact-name: visual-builder-macos
            artifact-path: build/macos/

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: true

      - name: Import Resources
        run: godot --headless --verbose --editor --quit --path .

      - name: Create Build Directory
        run: mkdir -v -p $(dirname ${{ matrix.output-path }})

      - name: Export Build
        run: godot --headless --verbose --path . --export-release "${{ matrix.export-name }}" "${{ matrix.output-path }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: export
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: visual-builder-windows
          path: build/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: visual-builder-macos
          path: build/macos

      - name: Prepare Release and Rename Files
        id: prep
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d')-b${{ github.run_number }}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          
          # Renommage des fichiers avec le tag de release
          mv build/windows/visual-builder.exe build/windows/visual-builder-$TAG_NAME.exe
          mv build/macos/visual-builder.zip build/macos/visual-builder-$TAG_NAME.zip
          
          # Export des chemins pour l'étape suivante
          echo "win_file=build/windows/visual-builder-$TAG_NAME.exe" >> $GITHUB_OUTPUT
          echo "mac_file=build/macos/visual-builder-$TAG_NAME.zip" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag_name }}
          name: Visual Builder ${{ steps.prep.outputs.tag_name }}
          body: |
            Automatic build for version ${{ steps.prep.outputs.tag_name }}
            
            ### Downloads
            * **Windows**: `visual-builder-${{ steps.prep.outputs.tag_name }}.exe`
            * **macOS**: `visual-builder-${{ steps.prep.outputs.tag_name }}.zip`
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.prep.outputs.win_file }}
            ${{ steps.prep.outputs.mac_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
