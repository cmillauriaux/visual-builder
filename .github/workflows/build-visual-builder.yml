name: Build Visual Builder

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    name: Export ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows
            export-name: Windows
            output-path: build/windows/visual-builder.exe
            artifact-name: visual-builder-windows
            artifact-path: build/windows/
          - platform: macOS
            export-name: macOS
            output-path: build/macos/visual-builder.zip
            artifact-name: visual-builder-macos
            artifact-path: build/macos/

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.4.0
          use-dotnet: false
          include-templates: true

      - name: Import Resources
        run: godot --headless --verbose --editor --quit --path .

      - name: Create Build Directory
        run: mkdir -v -p $(dirname ${{ matrix.output-path }})

      - name: Export Build
        run: godot --headless --verbose --path . --export-release "${{ matrix.export-name }}" "${{ matrix.output-path }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: export
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: visual-builder-windows
          path: build/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: visual-builder-macos
          path: build/macos

      - name: Create Tag
        id: create_tag
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d')-b${{ github.run_number }}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create_tag.outputs.tag_name }}
          name: Release ${{ steps.create_tag.outputs.tag_name }}
          draft: false
          prerelease: false
          files: |
            build/windows/visual-builder.exe
            build/macos/visual-builder.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
