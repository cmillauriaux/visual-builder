name: Build RunPod Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'plugins/ai_studio/runpod/Dockerfile'
      - 'plugins/ai_studio/runpod/extra_model_paths.yaml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no changes'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: plugins/ai_studio/runpod
          file: plugins/ai_studio/runpod/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vb-comfyui:latest
